            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6);

            font-size: 40px;

        }

            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #e68900;
        }
